<div class="settings-section">
    <div class="section-header">
        <h2 class="section-title">Cropping</h2>
        <p class="section-subtitle">Limit the active processing area</p>
    </div>

    <div class="settings-grid">
        <div class="form-row">
            <label class="form-label">X-Crop</label>
            <div class="triple-control">
                <input type="number" class="input input--short" value="-1" step="0.1">
                <input type="range" class="slider" min="-1" max="1" value="-0.1" step="0.1">
                <input type="number" class="input input--short" value="1" step="0.1">
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">Y-Crop</label>
            <div class="triple-control">
                <input type="number" class="input input--short" value="-0.1" step="0.1">
                <input type="range" class="slider" min="-1" max="1" value="-0.1" step="0.1">
                <input type="number" class="input input--short" value="1" step="0.1">
            </div>
        </div>
    </div>
</div>
