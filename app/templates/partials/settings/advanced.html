<div class="settings-section">
    <div class="section-header">
        <h2 class="section-title">Advanced</h2>
        <p class="section-subtitle">Additional processing controls</p>
    </div>

    <div class="settings-grid">
        <div class="form-row">
            <label class="form-label">Decimation</label>
            <input type="number" class="input" value="1.0" step="0.1">
        </div>

        <div class="form-row">
            <label class="form-label">Refine Edges</label>
            <select class="input">
                <option selected>Enabled</option>
                <option>Disabled</option>
            </select>
        </div>

        <div class="form-row">
            <label class="form-label">Decision Margin Min</label>
            <input type="number" class="input" value="35" step="1">
        </div>
    </div>
</div>
