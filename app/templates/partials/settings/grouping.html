<div class="settings-section">
    <div class="section-header">
        <h2 class="section-title">Target Grouping</h2>
        <p class="section-subtitle">Multi-target sorting and filtering</p>
    </div>

    <div class="settings-grid">
        <div class="form-row">
            <label class="form-label">Sort Mode</label>
            <select class="input">
                <option selected>Largest</option>
                <option>Closest</option>
                <option>Highest Confidence</option>
            </select>
        </div>

        <div class="form-row">
            <label class="form-label">Area (% of image)</label>
            <div class="triple-control">
                <input type="number" class="input input--short" value="0.0018" step="0.0001">
                <input type="range" class="slider" min="0" max="100" value="4.38" step="0.01">
                <input type="number" class="input input--short" value="100" step="0.1">
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">Target Grouping</label>
            <select class="input">
                <option selected>Single Target</option>
                <option>Cluster</option>
                <option>All Visible</option>
            </select>
        </div>
    </div>
</div>
